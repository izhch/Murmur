name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm install

      - name: Build for GitHub Pages (subpath /Murmur/)
        run: |
          # 修改 Astro 配置：添加 base 和 site URL
          sed -i "s|site: 'https://izhch.com'|site: 'https://izhch.github.io/Murmur', base: '/Murmur'|" astro.config.mjs
          # 修改 config.ts：将图片路径从 /avatar/ 改为 /Murmur/avatar/
          sed -i "s|'/avatar/|'/Murmur/avatar/|g" src/config.ts
          sed -i "s|'/banner/|'/Murmur/banner/|g" src/config.ts
          npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4