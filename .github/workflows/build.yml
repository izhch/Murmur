name: Build Static Site

# 触发条件：
# - repository_dispatch (event_type: rebuild)：Worker 在内容变更后触发重建
# - push to main：主分支代码更新时重建
on:
  repository_dispatch:
    types: [rebuild]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build
        # npm run build = astro build && node scripts/generate-static.mjs
        # astro build 生成基础静态站点，generate-static.mjs 注入公开文章卡片并生成详情页
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
