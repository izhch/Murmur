name = "murmur"
main = "src/index.js"
compatibility_date = "2024-12-01"

[[d1_databases]]
binding = "DB"
database_name = "moments-db"
database_id = "95988848-0758-43b0-8dc7-2c1c1a0c6cf2"

[[r2_buckets]]
binding = "IMG_BUCKET"
bucket_name = "murmur"

# 环境变量通过 `wrangler secret put` 设置：
# ADMIN_PWD        - 管理密码
# TEO_SECRET_ID    - 腾讯云 SecretId
# TEO_SECRET_KEY   - 腾讯云 SecretKey
# TEO_ZONE_ID      - EdgeOne 站点ID
# TEO_PURGE_TARGETS - 清缓存域名列表（JSON数组），如 '["izhch.com"]'
# GH_TOKEN         - GitHub Personal Access Token（repo, actions 权限）
# GH_REPO          - GitHub 仓库地址（格式：owner/repo），如 'izhch/Murmur'
# PWD_SALT         - 密码哈希盐值（可选，默认 murmur_default_salt_2026）
